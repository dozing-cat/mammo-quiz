<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>認定試験対策</title>
  <style>
    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --surface-2: #f1efe8;
      --text: #222018;
      --muted: #6f6b5f;
      --primary: #01696f;
      --primary-2: #0c4e54;
      --correct: #2d6a2d;
      --wrong: #9b2c2c;
      --border: #d8d3c8;
      --shadow: 0 10px 30px rgba(30,25,10,.08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: linear-gradient(180deg, #f7f6f2 0%, #eeebe3 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      width: min(920px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 18px 0 40px;
    }
    .card {
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .header {
      padding: 18px 18px 14px;
      margin-bottom: 14px;
    }
    .title {
      font-size: clamp(1.4rem, 1rem + 1vw, 2rem);
      font-weight: 800;
      margin: 0 0 8px;
    }
    .sub {
      color: var(--muted);
      font-size: .96rem;
      margin: 0;
    }
    .topbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 14px 18px;
      margin-bottom: 14px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }
    .stat {
      background: var(--surface-2);
      border-radius: 14px;
      padding: 10px 12px;
      border: 1px solid #e5e1d8;
    }
    .stat .k { font-size: .78rem; color: var(--muted); margin-bottom: 4px; }
    .stat .v { font-size: 1.15rem; font-weight: 800; }
    .controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      align-items: stretch;
    }
    .controls .row-break {
      grid-column: 1 / -1;
      display: contents;
    }
    .controls select, .controls button.secondary {
      min-height: 32px;
      padding: 6px 8px;
      font-size: 11px;
      line-height: 1.15;
    }
    .controls select {
      min-width: 0;
      width: 100%;
    }
    @media (min-width: 768px) {
      .controls {
        display: flex;
        flex-wrap: wrap;
      }
      .controls .row-break {
        display: contents;
      }
    }
    select, button {
      font: inherit;
    }
    select {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: white;
      min-width: 180px;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      background: var(--primary);
      color: white;
      font-weight: 700;
    }
    button.secondary {
      background: #ebe7dd;
      color: var(--text);
    }
    button:disabled {
      opacity: .45;
      cursor: default;
    }
    .quiz {
      padding: 18px;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: .92rem;
      margin-bottom: 12px;
    }
    .progress {
      height: 10px;
      background: #ece8df;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 18px;
    }
    .progress > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary), #3b8d93);
      transition: width .25s ease;
    }
    .question {
      font-size: clamp(1.1rem, .95rem + .7vw, 1.45rem);
      line-height: 1.55;
      font-weight: 750;
      margin: 0 0 16px;
    }
    .choices {
      display: grid;
      gap: 10px;
    }
    .choice {
      text-align: left;
      width: 100%;
      padding: 14px 14px;
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      transition: transform .08s ease, border-color .15s ease, background .15s ease;
    }
    .choice:hover { transform: translateY(-1px); }
    .choice.correct {
      background: #eef8ee;
      border-color: #8dc58d;
      color: var(--correct);
    }
    .choice.wrong {
      background: #fff0f0;
      border-color: #d99a9a;
      color: var(--wrong);
    }
    .explanation {
      margin-top: 12px;
      padding: 14px;
      border-radius: 14px;
      background: #f5f4ef;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #e5e1d8;
      line-height: 1.7;
      display: none;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .result {
      padding: 22px 18px;
      text-align: center;
    }
    .result h2 {
      margin: 0 0 10px;
      font-size: 1.6rem;
    }
    .result p { color: var(--muted); }
    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #e9f3f4;
      color: var(--primary-2);
      font-size: .82rem;
      font-weight: 700;
    }
    
    
    .secondary.active-flag {
      background: #e9f1f1;
      color: #0c4e54;
      border: 1px solid #b8d0d1;
    }

    .issue-panel {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f5f4ef;
      border: 1px solid #e5e1d8;
    }
    .issue-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
        .issue-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .issue-actions .secondary {
      min-height: 30px;
      padding: 5px 6px;
      font-size: 10.5px;
      letter-spacing: -.01em;
    }
    
    
    
    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .flag-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
      text-align: left;
    }
    .flag-item {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
    }
    .flag-id {
      font-size: .78rem;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: .04em;
    }
    
    
    .mastery-grid {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }
    .mastery-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }
    .mastery-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .mastery-title {
      font-weight: 700;
    }
    .mastery-percent {
      font-weight: 800;
      color: var(--primary);
    }
    .bar {
      height: 10px;
      border-radius: 999px;
      background: #ece8df;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .bar > div {
      height: 100%;
      background: linear-gradient(90deg, #7fb1b4 0%, #01696f 100%);
      border-radius: 999px;
    }
    .mastery-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: .86rem;
    }

    .copy-box {
      width: 100%;
      min-height: 140px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      font: inherit;
      line-height: 1.6;
      background: #fff;
      color: var(--text);
      resize: vertical;
      margin-top: 12px;
    }

    .flag-question {
      line-height: 1.6;
      font-weight: 600;
    }

    .sticky-next {
      position: sticky;
      bottom: 0;      display: flex;
      justify-content: flex-end;
      padding-top: 12px;
      margin-top: 12px;
      background: linear-gradient(180deg, rgba(247,246,242,0) 0%, rgba(247,246,242,0.88) 24%, rgba(247,246,242,0.96) 100%);
      backdrop-filter: blur(6px);
    }
    .sticky-next button {
      min-width: 132px;
      box-shadow: 0 8px 20px rgba(1,105,111,.16);
    }

    .controls-v2 { display:grid; gap:8px; }
.toolbar-grid-v2 { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:6px; }
.toolbar-grid-v2 button, .saved-grid button { min-height:34px; padding:6px 8px; font-size:11px; line-height:1.15; }
#savedToggleBtn { background: var(--primary); color: white; }
.saved-panel { display:none; margin-top:2px; padding:10px; border-radius:14px; background:#f5f4ef; border:1px solid #e5e1d8; }
.saved-panel.open { display:block; }
.saved-grid { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:6px; }
@media (min-width: 768px) {
  .toolbar-grid-v2 { grid-template-columns:repeat(4, minmax(0, 1fr)); }
}
@media (max-width: 700px) {
      .wrap { width: min(100vw - 10px, 920px); }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .topbar, .quiz, .header { padding: 12px; }
      .footer { align-items: stretch; }
      .footer button { width: 100%; }
      .controls { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 5px; }
      .controls select, .controls button.secondary { min-width: 0; width: 100%; min-height: 30px; padding: 5px 6px; font-size: 10.5px; letter-spacing: -.01em; }
      .controls select { grid-column: 1 / -1; min-height: 44px; padding: 10px 12px; font-size: 14px; letter-spacing: 0; }
      #restartBtn { grid-column: 1 / 4; }
      #retryWrongBtn { grid-column: 4 / 7; }
      #masteryPageBtn { grid-column: 1 / 3; }
      #savedToggleBtn { grid-column: 3 / 7; }      #flaggedPageBtn { grid-column: 5 / 7; }
   
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card header">
      <h1 class="title">認定試験対策</h1>
      
    </section>

    <section class="card topbar">
      <div class="stats">
        <div class="stat"><div class="k" id="masteryLabel">習熟度</div><div class="v" id="overallMastery">0%</div></div>
        <div class="stat"><div class="k">完了</div><div class="v" id="clearedCount">0</div></div>
      </div>
            <div class="controls-v2">
        <select id="categorySelect"></select>
                      <div class="toolbar-grid-v2">
          <button id="restartBtn" class="secondary">最初から</button>
          <button id="retryWrongBtn" class="secondary">間違えた問題だけ</button>
          <button id="masteryPageBtn" class="secondary">習熟度</button>
                                  <button id="savedToggleBtn" class="secondary">保存済み</button>
      </div>
                      <div id="savedPanel" class="saved-panel">
                                  <div class="saved-grid">
                                                <button id="bookmarkPageBtn" class="secondary">ブックマーク</button>
                                                <button id="flaggedPageBtn" class="secondary">違和感あり</button>
                                              </div>
                                </div>
    </section>

    <main class="card quiz" id="app"></main>
  </div>

  <script>
    const QUESTION_BANK = [
      {id:'q001',category:'解剖と生理',question:'乳腺機能の最小単位として正しいのはどれか。',choices:['小葉','TDLU','Cooper靱帯','乳管洞'],answer_index:0,explanation:'乳腺機能の最小単位は小葉である。TDLUは小葉と小葉外終末乳管を含む単位として扱われる。'},
      {id:'q002',category:'解剖と生理',question:'ほとんどの乳癌の発生母地と考えられているのはどれか。',choices:['TDLU','Cooper靱帯','乳腺後隙','モントゴメリ腺'],answer_index:0,explanation:'ほとんどの乳癌はTDLUを発生母地と考える。'},
      {id:'q003',category:'解剖と生理',question:'dense breastについて正しいのはどれか。',choices:['マンモグラフィで腫瘤の検出が難しい','マンモグラフィで腫瘤検出が容易である','石灰化を全く認めない','高齢者にしかみられない'],answer_index:0,explanation:'dense breastではマンモグラフィで腫瘤検出が難しくなる。'},
      {id:'q004',category:'解剖と生理',question:'乳児の吸乳刺激により分泌され、筋上皮細胞を収縮させるホルモンはどれか。',choices:['オキシトシン','プロラクチン','エストロゲン','プロゲステロン'],answer_index:0,explanation:'吸乳刺激は視床下部を介してオキシトシン分泌を促し、筋上皮細胞収縮による射乳に関与する。'},
      {id:'q005',category:'解剖と生理',question:'乳腺組織が最も多く存在する領域として正しいのはどれか。',choices:['上外側域（C領域）','下内側域','乳腺後隙','乳輪部のみ'],answer_index:0,explanation:'乳腺組織は上外側域に多く存在する。'},
      {id:'q006',category:'解剖と生理',question:'モントゴメリ腺について正しいのはどれか。',choices:['皮脂腺の一種で、乳腺の中間的性質も有する','乳汁産生だけを担う純粋な腺房である','リンパ節門に存在する','筋上皮細胞から構成される'],answer_index:0,explanation:'モントゴメリ腺は皮脂腺の一種だが、乳腺の中間的性質を有するとされる。'},
      {id:'q007',category:'解剖と生理',question:'Cooper靱帯について正しいのはどれか。',choices:['乳腺の筋膜層をつなぎ、乳腺全体の構築に関与する','乳汁を産生する','腋窩リンパ節の一部である','乳頭の表皮を形成する'],answer_index:0,explanation:'Cooper靱帯は浅胸筋膜と深胸筋膜をつなぐ線維性構造で、乳腺全体の構築に関わる。'},
      {id:'q008',category:'解剖と生理',question:'小葉について正しいのはどれか。',choices:['腺房上皮と小葉内終末乳管からなる','小葉外終末乳管のみからなる','乳管洞と乳頭からなる','脂肪組織とリンパ節からなる'],answer_index:0,explanation:'小葉は腺房上皮と小葉内終末乳管からなる。'},
      {id:'q009',category:'解剖と生理',question:'TDLUの構成として正しいのはどれか。',choices:['小葉と小葉外終末乳管','腺房のみ','小葉内終末乳管のみ','Cooper靱帯と乳頭'],answer_index:0,explanation:'TDLUは小葉に小葉外終末乳管を加えた単位である。'},
      {id:'q010',category:'解剖と生理',question:'腋窩リンパ節について正しいのはどれか。',choices:['リンパ節門の部分に脂肪が沈着することがある','常に石灰化を伴う','乳房内のどこにでも存在する','正常では腎臓形を示さない'],answer_index:0,explanation:'腋窩リンパ節門には脂肪沈着をみることがある。'},
      {id:'q011',category:'病理',question:'乳管癌と小葉癌を病理学的に区別するうえで重視されるのはどれか。',choices:['増殖パターン','患者年齢','発症側','乳頭分泌の有無'],answer_index:0,explanation:'乳管癌と小葉癌の区別は発生部位そのものより増殖パターンで考える。'},
      {id:'q012',category:'病理',question:'DCISについて正しいのはどれか。',choices:['理論的には転移しない','必ず遠隔転移する','小葉外乳管へは進展しない','非浸潤癌とは別概念である'],answer_index:0,explanation:'真のDCISは理論的には転移しない病変である。'},
      {id:'q013',category:'病理',question:'DCISと同義語として適切なのはどれか。',choices:['非浸潤性乳管癌','浸潤性小葉癌','葉状腫瘍','乳腺浮腫'],answer_index:0,explanation:'DCISは非浸潤性乳管癌と同義である。'},
      {id:'q014',category:'病理',question:'ADHについて正しいのはどれか。',choices:['非浸潤性乳管癌の基準を完全には満たさない病変である','DCISと完全に同義である','浸潤癌の特殊型である','乳頭部の表皮内進展を指す'],answer_index:0,explanation:'ADHはDCISの基準を完全には満たさない異型乳管過形成である。'},
      {id:'q015',category:'病理',question:'Paget病について正しいのはどれか。',choices:['悪性細胞が乳管洞から乳頭表面へ広がる','乳腺浮腫のみを示す病変である','常にマンモグラフィで明瞭に描出される','乳腺症の一型である'],answer_index:0,explanation:'Paget病は悪性細胞の乳頭表面への進展で、皮膚所見が診断の手がかりとなる。'},
      {id:'q016',category:'病理',question:'ポップコーンサインの成因として正しいのはどれか。',choices:['線維腺腫の退縮','嚢胞の感染','DCISの壊死','脂肪壊死の出血'],answer_index:0,explanation:'ポップコーンサインは退縮した線維腺腫にみられる。'},
      {id:'q017',category:'病理',question:'放射状瘢痕について正しいのはどれか。',choices:['DCISやADHを伴うことがある','常に良悪性の鑑別が容易である','スピキュラを呈することはない','乳頭分泌の最も多い原因である'],answer_index:0,explanation:'放射状瘢痕は画像上浸潤癌に似ており、DCISやADHを伴うことがある。'},
      {id:'q018',category:'病理',question:'硬化性腺症について正しいのはどれか。',choices:['小葉で発生し、構築の乱れの原因となることがある','必ず石灰化を伴う','浸潤癌の特殊型である','乳管拡張症と同義である'],answer_index:0,explanation:'硬化性腺症は小葉で発生し、architectural distortionの原因となることがある。'},
      {id:'q019',category:'病理',question:'脂肪壊死について正しいのはどれか。',choices:['外傷・手術・放射線治療後に生じることがある','DCISに特異的である','必ず良悪性の鑑別が容易である','微小石灰化を伴わない'],answer_index:0,explanation:'脂肪壊死は外傷や手術、放射線治療後に起こり、乳癌類似像をとることがある。'},
      {id:'q020',category:'病理',question:'浸潤性小葉癌について正しいのはどれか。',choices:['微小石灰化を伴いにくく、マンモグラフィで偽陰性になりやすい','マンモグラフィで必ず見つけやすい','境界明瞭な腫瘤としてのみ表れる','組織亜型は存在しない'],answer_index:0,explanation:'浸潤性小葉癌は微小石灰化を伴いにくく、MMGで見つけにくいことがある。'},
      {id:'q021',category:'病理',question:'粘液癌について正しいのはどれか。',choices:['高齢者に多く、予後が良い','若年者に多く予後不良である','必ずスピキュラを伴う','乳腺症の構成成分である'],answer_index:0,explanation:'粘液癌は高齢者に多く、特に純粋型は予後良好とされる。'},
      {id:'q022',category:'病理',question:'葉状腫瘍について正しいのはどれか。',choices:['良性・境界病変・悪性に分類される','すべて悪性である','若年者にしか発生しない','リンパ行性転移が多い'],answer_index:0,explanation:'葉状腫瘍は良性、境界病変、悪性に分類される。'},
      {id:'q023',category:'病理',question:'乳管内乳頭腫について正しいのはどれか。',choices:['血性乳頭分泌の主要な原因である','必ず悪性である','乳腺症には含まれない','石灰化のみで発見される'],answer_index:0,explanation:'乳管内乳頭腫は血性乳頭分泌の主要な原因である。'},
      {id:'q024',category:'病理',question:'乳腺症を構成する部分像として適切なのはどれか。',choices:['硬化性腺症','線維腫症','浸潤性小葉癌','過誤腫'],answer_index:0,explanation:'硬化性腺症は乳腺症の構成成分に含まれる。'},
      {id:'q025',category:'病理',question:'乳腺症を構成する部分像ではないものはどれか。',choices:['線維腫症','嚢胞','アポクリン化生','小葉増生症'],answer_index:0,explanation:'線維腫症は非上皮性腫瘍であり、乳腺症の部分像ではない。'},

    const STORAGE_KEY = 'mammo-quiz-state-v1';

    function makeInitialState() {
      return {
        currentCategory: 'all',
        statsById: {},
        wrongIds: [],
        flaggedIds: [],
        bookmarkedIds: [],
        questions: [],
        pool: [],
        base: [],
        currentSessionIds: [],
        sessionSize: 10,
        index: 0,
        correct: 0,
        answered: 0,
        locked: false,
        view: 'quiz'
      };
    }

    function normalizeState(raw) {
      const base = makeInitialState();
      if (!raw || typeof raw !== 'object') return base;
      return {
        ...base,
        currentCategory: typeof raw.currentCategory === 'string' ? raw.currentCategory : 'all',
        statsById: raw.statsById && typeof raw.statsById === 'object' ? raw.statsById : {},
        wrongIds: Array.isArray(raw.wrongIds) ? raw.wrongIds : [],
        flaggedIds: Array.isArray(raw.flaggedIds) ? raw.flaggedIds : [],
        bookmarkedIds: Array.isArray(raw.bookmarkedIds) ? raw.bookmarkedIds : []
      };
    }

    function loadPersistedState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return makeInitialState();
        return normalizeState(JSON.parse(raw));
      } catch (e) {
        return makeInitialState();
      }
    }

    function saveState() {
      try {
        const payload = {
          currentCategory: state.currentCategory,
          statsById: state.statsById,
          wrongIds: state.wrongIds,
          flaggedIds: state.flaggedIds,
          bookmarkedIds: state.bookmarkedIds
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      } catch (e) {}
    }

    const state = Object.assign(makeInitialState(), loadPersistedState());

    const app = document.getElementById('app');
    const masteryLabel = document.getElementById('masteryLabel');
    const overallMastery = document.getElementById('overallMastery');
    const clearedCount = document.getElementById('clearedCount');
    const categorySelect = document.getElementById('categorySelect');
    const restartBtn = document.getElementById('restartBtn');
    const retryWrongBtn = document.getElementById('retryWrongBtn');
    const masteryPageBtn = document.getElementById('masteryPageBtn');
const savedToggleBtn = document.getElementById('savedToggleBtn');
const savedPanel = document.getElementById('savedPanel');

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function shuffleChoicesPerRender(questions) {
      return questions.map(q => {
        const indexed = q.choices.map((c, i) => ({ text: c, isCorrect: i === q.answer_index }));
        const mixed = shuffle(indexed);
        return {
          ...q,
          choices: mixed.map(x => x.text),
          answer_index: mixed.findIndex(x => x.isCorrect)
        };
      });
    }

    function buildCategories() {
      const cats = ['all', ...new Set(QUESTION_BANK.map(q => q.category))];
      categorySelect.innerHTML = cats.map(c => `<option value="${c}">${c === 'all' ? '全カテゴリ' : c}</option>`).join('');
    }

    function buildPool() {
      if (state.currentCategory === 'all') return [...QUESTION_BANK];
      return QUESTION_BANK.filter(q => q.category === state.currentCategory);
    }

    function weightedPick(pool, count) {
      const available = [...pool];
      const picked = [];
      while (available.length && picked.length < count) {
        const weights = available.map(q => {
          const s = state.statsById[q.id] || { seen: 0, wrong: 0, mastery: 0 };
          const mastery = s.mastery || 0;
          const inSelectedCategory = state.currentCategory === 'all' || q.category === state.currentCategory;
          const wrongBoost = inSelectedCategory ? 4 : 2;
          const masteryWeightMap = [6, 4, 2, 0.8];
          const masteryWeight = masteryWeightMap[Math.max(0, Math.min(3, mastery))];
          return masteryWeight + s.wrong * wrongBoost + Math.max(0, s.seen * 0.05);
        });
        const total = weights.reduce((a,b)=>a+b,0);
        let r = Math.random() * total;
        let idx = 0;
        for (let i=0;i<available.length;i++) {
          r -= weights[i];
          if (r <= 0) { idx = i; break; }
        }
        picked.push(available[idx]);
        available.splice(idx,1);
      }
      return picked;
    }

    function prepareQuestions(mode = 'all') {
      let src = buildPool();
      if (mode === 'wrong') {
        const wrongSet = new Set(state.wrongIds);
        src = src.filter(q => wrongSet.has(q.id));
      }
      state.base = src;
      state.pool = src;
      const selected = weightedPick(src, state.sessionSize);
      state.currentSessionIds = selected.map(q => q.id);
      state.questions = shuffleChoicesPerRender(selected);
      state.index = 0;
      state.correct = 0;
      state.answered = 0;
      state.locked = false;
      updateStats();
      render();
    }

    function updateStats() {
      const targetItems = state.currentCategory === 'all'
        ? QUESTION_BANK
        : QUESTION_BANK.filter(q => q.category === state.currentCategory);
      const totalQuestions = targetItems.length;
      const masterySum = targetItems.reduce((sum, q) => {
        const s = state.statsById[q.id] || { mastery: 0 };
        return sum + Math.max(0, Math.min(3, s.mastery || 0));
      }, 0);
      const masteryPct = totalQuestions ? Math.round((masterySum / (totalQuestions * 3)) * 100) : 0;
      const cleared = targetItems.filter(q => ((state.statsById[q.id] || {}).mastery || 0) >= 3).length;
      const label = state.currentCategory === 'all' ? '習熟度' : `${state.currentCategory} の習熟度`;
      const masteryLabel = document.getElementById('masteryLabel');
      if (masteryLabel) masteryLabel.textContent = label;
      if (overallMastery) overallMastery.textContent = `${masteryPct}%`;
      if (clearedCount) clearedCount.textContent = cleared;
      retryWrongBtn.disabled = state.wrongIds.length === 0;
    }

    function toggleBookmarkCurrent() {
      const q = state.questions[state.index];
      if (!q) return;
      if (state.bookmarkedIds.includes(q.id)) {
        state.bookmarkedIds = state.bookmarkedIds.filter(id => id !== q.id);
      } else {
        state.bookmarkedIds.unshift(q.id);
      }
      saveState();
        // render()を呼ばず、ブックマークボタンだけ更新
  const bookmarkBtn = document.querySelector('.issue-actions button:nth-child(1)');
  if (bookmarkBtn) {
    if (state.bookmarkedIds.includes(q.id)) {
      bookmarkBtn.classList.add('active-flag');
    } else {
      bookmarkBtn.classList.remove('active-flag');
    }
  }
    }

    function removeBookmark(id) {
      state.bookmarkedIds = state.bookmarkedIds.filter(x => x !== id);
      saveState();
      renderBookmarks();
    }

    function renderBookmarks() {
      state.view = 'bookmarks';
      const items = state.bookmarkedIds.map(id => QUESTION_BANK.find(q => q.id === id)).filter(Boolean);
      app.innerHTML = `
        <div class="result">
          <span class="pill">ブックマーク</span>
          <h2>ブックマークした問題</h2>
          ${items.length ? `
            <div class="bookmark-list" style="display:grid; gap:10px; margin-top:14px; text-align:left; font-size:13px;">
              ${items.map(q => `
                <div class="choice" style="display:block; padding:12px;">
                  <div style="display:flex; justify-content:space-between; gap:12px; align-items:flex-start; margin-bottom:8px;">
                    <div>
                      <div style="font-size:11px; color:var(--muted); margin-bottom:4px;">${q.id}｜${q.category}</div>
                      <div style="font-weight:700; margin-bottom:8px;">${q.question}</div>
                    </div>
                    <button class="secondary" style="font-size:12px; padding:6px 8px; min-height:32px;" onclick="removeBookmark('${q.id}')">解除</button>
                  </div>
                  <div style="font-size:12px; color:var(--muted);">${q.choices.map((c, i) => `${String.fromCharCode(65+i)}. ${c}`).join(' ／ ')}</div>
                </div>
              `).join('')}
            </div>
          ` : '<p style="margin-top:12px; color:var(--muted);">ブックマークはありません</p>'}
          <div class="footer" style="justify-content:center; margin-top:18px;">
            <button onclick="backToQuiz()">戻る</button>
          </div>
        </div>`;
    }

    function toggleFlagCurrent() {
      const q = state.questions[state.index];
      if (!q) return;
      const pos = state.flaggedIds.indexOf(q.id);
      if (pos >= 0) {
        state.flaggedIds.splice(pos, 1);
      } else {
        state.flaggedIds.push(q.id);
      }
      saveState();
      updateStats();
      // render()を呼ばず、フラグボタンだけ更新
      const flagBtn = document.querySelector('.issue-actions button:nth-child(2)');
      if (flagBtn) {
        if (state.flaggedIds.includes(q.id)) {
          flagBtn.classList.add('active-flag');
        } else {
          flagBtn.classList.remove('active-flag');
        }
      }
    }

    function calcMastery(question) {
      const s = state.statsById[question.id] || { mastery: 0 };
      return Math.max(0, Math.min(100, Math.round(((s.mastery || 0) / 3) * 100)));
    }

    function categoryMasteryRows() {
      const categories = [...new Set(QUESTION_BANK.map(q => q.category))];
      return categories.map(category => {
        const items = QUESTION_BANK.filter(q => q.category === category);
        const percents = items.map(calcMastery);
        const avg = items.length ? Math.round(percents.reduce((a, b) => a + b, 0) / items.length) : 0;
        const cleared = items.filter(q => calcMastery(q) >= 100).length;
        const untouched = items.filter(q => !(state.statsById[q.id]?.seen)).length;
        return { category, total: items.length, avg, cleared, untouched };
      });
    }

    function openMasteryPage() {
      state.view = 'mastery';
      render();
    }

    function buildFlaggedLineText() {
      const flagged = QUESTION_BANK.filter(q => state.flaggedIds.includes(q.id));
      if (!flagged.length) return '違和感ありはありません';
      return ['違和感あり', ...flagged.map(q => `${q.id}｜${q.category}｜${q.question}`)].join(String.fromCharCode(10));
    }
    function copyFlaggedText() {
      const text = buildFlaggedLineText();
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => {
          alert('LINEに貼り付けやすい形式でコピーしました。');
        }).catch(() => {
          const box = document.getElementById('flaggedCopyBox');
          if (box) { box.focus(); box.select(); }
        });
      } else {
        const box = document.getElementById('flaggedCopyBox');
        if (box) { box.focus(); box.select(); }
      }
    }


    function renderFlaggedPage() {
      const flagged = QUESTION_BANK.filter(q => state.flaggedIds.includes(q.id));
      app.innerHTML = `
        <section class="result" style="text-align:left;">
          <div class="top-actions" style="justify-content:space-between; align-items:center; margin-bottom:12px;">
            <button class="secondary" onclick="backToQuiz()">戻る</button>
            <button class="secondary" onclick="clearAllFlags()" ${flagged.length ? '' : 'disabled'}>一括削除</button>
          </div>
          <span class="pill">違和感あり</span>
          <h2 style="margin-top:10px;">${flagged.length}件</h2>
          ${flagged.length ? `
            <textarea id="flaggedCopyBox" class="copy-box" readonly>${buildFlaggedLineText()}</textarea>
            <div class="top-actions" style="margin-top:10px; justify-content:flex-end;">
              <button class="secondary" onclick="copyFlaggedText()">コピー</button>
            </div>
            <div class="flag-list">
              ${flagged.map(q => `
                <div class="flag-item">
                  <div class="flag-id">${q.id} / ${q.category}</div>
                  <div class="flag-question">${q.question}</div>
                </div>
              `).join('')}
            </div>
          ` : '<p>登録はありません。</p>'}
        </section>
      `;
    }

    function openFlaggedPage() {
      state.view = 'flagged';
      renderFlaggedPage();
    }

    function backToQuiz() {
      state.view = 'quiz';
      render();
    }

    function clearAllFlags() {
      if (!state.flaggedIds || !state.flaggedIds.length) return;
      const ok = confirm('違和感ありをすべて削除しますか？');
      if (!ok) return;
      state.flaggedIds = [];
      saveState();
      updateStats();
      renderFlaggedPage();
    }

    function answer(choiceIndex) {
      if (state.locked) return;
      state.locked = true;
      const q = state.questions[state.index];
      const buttons = [...document.querySelectorAll('.choice')];
      const ok = choiceIndex === q.answer_index;
      state.answered += 1;
      if (!state.statsById[q.id]) state.statsById[q.id] = { seen: 0, wrong: 0, correct: 0, mastery: 0 };
      state.statsById[q.id].seen += 1;
      if (ok) {
        state.correct += 1;
        state.statsById[q.id].correct += 1;
        state.statsById[q.id].mastery = Math.min(3, (state.statsById[q.id].mastery || 0) + 1);
      } else {
        if (!state.wrongIds.includes(q.id)) state.wrongIds.push(q.id);
        state.statsById[q.id].wrong += 1;
        state.statsById[q.id].mastery = Math.max(0, (state.statsById[q.id].mastery || 0) - 2);
      }
      buttons.forEach((btn, i) => {
        if (i === q.answer_index) btn.classList.add('correct');
        if (i === choiceIndex && i !== q.answer_index) btn.classList.add('wrong');
        btn.disabled = true;
      });
      document.getElementById('explanation').style.display = 'block';
      updateStats();
      saveState();
      document.getElementById('nextBtn').disabled = false;
    }

    function next() {
      state.index += 1;
      state.locked = false;
      render();
    }


    function resetProgress() {
      state.correct = 0;
      state.answered = 0;
      state.index = 0;
      state.locked = false;
      state.view = 'quiz';
      prepareQuestions('all');
    }

    function renderResult() {
      const total = state.questions.length;
      const rate = total ? Math.round((state.correct / total) * 100) : 0;
      const wrongInSession = state.questions.filter(q => (state.statsById[q.id]?.seen || 0) > 0 && (state.statsById[q.id]?.wrong || 0) > 0).length;
      app.innerHTML = `
        <section class="result">
          <span class="pill">今回の結果</span>
          <h2>${total}問が終了しました</h2>
          <p>${total}問中 ${state.correct}問正解、正答率 ${rate}%</p>
          <p>次回は、間違えた問題や苦手傾向のある問題をやや多めに出題します。</p>
          <div class="footer" style="justify-content:center; margin-top:18px;">
            <button onclick="prepareQuestions('all')">次の10問へ</button>
            <button class="secondary" onclick="prepareQuestions('wrong')" ${state.wrongIds.length ? '' : 'disabled'}>間違えた問題から10問</button>
          </div>
        </section>
      `;
    }

    function render() {
      if (state.view === 'mastery') {
        const rows = categoryMasteryRows();
        app.innerHTML = `
          <section class="result" style="text-align:left;">
            <div class="top-actions" style="justify-content:space-between; align-items:center; margin-bottom:12px;">
              <button class="secondary" onclick="backToQuiz()">戻る</button>
            </div>
            <span class="pill">習熟度</span>
            <h2 style="margin-top:10px;">カテゴリ別の到達状況</h2>
            
            <div class="mastery-grid">
              ${rows.map(row => `
                <div class="mastery-card">
                  <div class="mastery-head">
                    <div class="mastery-title">${row.category}</div>
                    <div class="mastery-percent">${row.avg}%</div>
                  </div>
                  <div class="bar"><div style="width:${row.avg}%"></div></div>
                  <div class="mastery-meta">
                    <span>完了 ${row.cleared}/${row.total}</span>
                    <span>未着手 ${row.untouched}</span>
                  </div>
                </div>
              `).join('')}
            </div>
          </section>
        `;
        return;
      }
      if (state.view === 'flagged') {
        renderFlaggedPage();
        return;
      }
      if (!state.questions.length) {
        app.innerHTML = `<section class="result"><h2>出題できる問題がありません</h2><p>カテゴリや条件を見直してください。</p></section>`;
        return;
      }
      if (state.index >= state.questions.length) {
        renderResult();
        return;
      }
      const q = state.questions[state.index];
      const progress = Math.round((state.index / state.questions.length) * 100);
      app.innerHTML = `
        <div class="meta">
          <span>${state.index + 1} / ${state.questions.length}</span>
          <span>${q.category}</span>
        </div>
        <div class="progress"><div style="width:${progress}%"></div></div>
        <h2 class="question">${q.question}</h2>
        <div class="choices">
          ${q.choices.map((c, i) => `<button class="choice" onclick="answer(${i})">${String.fromCharCode(65+i)}. ${c}</button>`).join('')}
        </div>
        <div class="explanation" id="explanation"><strong>解説:</strong> ${q.explanation}</div>
        <div class="issue-panel">
          <div class="issue-row">
            <div class="issue-actions">
              <button class="secondary ${state.bookmarkedIds.includes(q.id) ? 'active-flag' : ''}" onclick="toggleBookmarkCurrent()">ブックマーク</button>
            <button class="secondary ${state.flaggedIds.includes(q.id) ? 'active-flag' : ''}" onclick="toggleFlagCurrent()">違和感あり</button>
            </div>
          </div>
        </div>
        <div class="footer">
          <div class="sub"></div>
        </div>
        <div class="sticky-next">
          <button id="nextBtn" onclick="next()" disabled>次へ</button>
        </div>
      `;
    }

    categorySelect.addEventListener('change', e => {
      state.currentCategory = e.target.value;
      state.view = 'quiz';
      prepareQuestions('all');
    });
    restartBtn.addEventListener('click', resetProgress);
    retryWrongBtn.addEventListener('click', () => { state.view = 'quiz'; prepareQuestions('wrong'); });
    masteryPageBtn.addEventListener('click', openMasteryPage);
    bookmarkPageBtn.addEventListener('click', renderBookmarks);
    flaggedPageBtn.addEventListener('click', openFlaggedPage);
if (savedToggleBtn && savedPanel) {
  savedToggleBtn.addEventListener('click', () => {
    const isOpen = savedPanel.classList.toggle('open');
    savedToggleBtn.textContent = isOpen ? '保存済みを閉じる' : '保存済み';
  });
}

    buildCategories();
    prepareQuestions('all');

    window.answer = answer;
    window.next = next;
    window.prepareQuestions = prepareQuestions;
    window.toggleFlagCurrent = toggleFlagCurrent;
    window.toggleBookmarkCurrent = toggleBookmarkCurrent;
    window.removeBookmark = removeBookmark;
    window.renderBookmarks = renderBookmarks;
    window.copyFlaggedText = copyFlaggedText;
    window.openMasteryPage = openMasteryPage;
    window.openFlaggedPage = openFlaggedPage;
    window.backToQuiz = backToQuiz;
    window.clearAllFlags = clearAllFlags;
    window.resetProgress = resetProgress;
  </script>
</body>
</html>
