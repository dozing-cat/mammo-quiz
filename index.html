<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>マンモグラフィ認定試験対策</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrap">
    <div class="card">
      <header class="header">
        <h1 class="title">マンモグラフィ認定試験対策</h1>
        <p class="sub">マンモグラフィ認定試験対策</p>
      </header>

      <div class="topbar card">
        <div class="stats">
          <div class="stat">
            <div class="t" id="masteryLabel">習熟度</div>
            <div class="v" id="overallMastery">0%</div>
          </div>
          <div class="stat">
            <div class="t">完了</div>
            <div class="v" id="clearedCount">0</div>
          </div>
        </div>
        <div class="controls">
          <select id="categorySelect"></select>
          <div class="button-row">
            <button class="secondary half-width" id="restartBtn">最初から</button>
            <button class="secondary half-width" id="retryWrongBtn" disabled>間違えた問題だけ</button>
          </div>
          <div class="button-row">
            <button class="secondary half-width" id="masteryPageBtn">習熟度</button>
            <button class="secondary half-width" id="savedToggleBtn">保存済み</button>
          </div>
        </div>
        <div class="saved-panel" id="savedPanel">
          <div class="saved-grid">
            <button class="secondary half-width" id="bookmarkToggleBtn">ブックマーク</button>
            <button class="secondary half-width" id="triggerPageBtn">違和感あり</button>
          </div>
        </div>
      </div>

      <div class="quiz card" id="app"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
